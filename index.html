<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#05070d" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <title>PWA NES Mobile</title>
  </head>
  <body>
    <div id="app">
      <section id="landing" class="landing">
        <div class="card">
          <div class="brandMark" aria-hidden="true">FC</div>
          <p class="eyebrow">随时开机 · 支持双人直连</p>
          <h1>PWA NES</h1>
          <p class="subtitle">为手机重新设计的 NES 模拟器，支持中文游戏库、存档和 WebRTC 双人联机。</p>
          <div class="landingActions">
            <label class="fileBtn primaryAction">
              从本机选择游戏
              <input id="romInput" type="file" accept=".nes,application/octet-stream" />
            </label>
            <button id="libraryBtn" class="secondary">搜索中文游戏库</button>
            <button id="demoBtn" class="ghostButton">预览虚拟手柄</button>
          </div>
          <p id="inviteStatusText" class="inviteStatus hidden" role="status"></p>
          <div class="featureChips" aria-label="功能特点">
            <span>离线可玩</span><span>即时存档</span><span>自定义手柄</span>
          </div>
          <p class="hint">iPhone 建议使用 Safari“添加到主屏幕”，可获得更大的游戏区域。</p>
        </div>
      </section>

      <section id="game" class="game hidden">
        <div class="topHud">
          <button id="menuBtn">菜单</button>
          <span id="statusText">未加载游戏</span>
          <button id="settingsBtn">设置</button>
          <button id="soundBtn">声音</button>
          <button id="pauseBtn">暂停</button>
        </div>

        <div id="screenWrap" class="screenWrap">
          <canvas id="screen" width="256" height="240"></canvas>
          <button id="fullscreenBtn" class="fullscreenBtn" aria-label="放大横屏" title="放大横屏">⛶</button>
        </div>

        <div id="controller" class="controller">
          <div class="leftZone">
            <div id="dpad" class="dpad" aria-label="方向键">
              <div class="padVisual up">▲</div>
              <div class="padVisual left">◀</div>
              <div class="padVisual center"></div>
              <div class="padVisual right">▶</div>
              <div class="padVisual down">▼</div>
              <div class="dpadTouch"></div>
            </div>
          </div>

          <div class="middleZone">
            <button class="pill" data-btn="SELECT">SELECT</button>
            <button class="pill" data-btn="START">START</button>
          </div>

          <div class="rightZone">
            <button class="round b" data-btn="B">B</button>
            <button class="round a" data-btn="A">A</button>
            <button class="round small tb" data-btn="TURBO_B">连 B</button>
            <button class="round small ta" data-btn="TURBO_A">连 A</button>
          </div>
        </div>
      </section>

      <dialog id="menuDialog" class="menuDialog">
        <h2>菜单</h2>
        <section class="menuSection">
          <h3>游戏</h3>
          <div class="menuGrid">
            <label class="fileBtn compact">
              本机游戏
              <input id="romInput2" type="file" accept=".nes,application/octet-stream" />
            </label>
            <button id="menuLibraryBtn">中文游戏库</button>
            <button id="saveStateBtn">保存进度</button>
            <button id="loadStateBtn">读取进度</button>
          </div>
        </section>
        <section class="menuSection">
          <h3>双人直连</h3>
          <button id="netHostBtn">创建直连房间</button>
          <div class="menuGrid">
            <button id="netCopyBtn">复制邀请链接</button>
            <button id="netLeaveBtn" class="dangerButton">断开联机</button>
          </div>
          <input id="netLinkInput" class="netLink" type="text" readonly aria-label="联机邀请链接" />
          <p id="netStatusText" class="networkStatus" role="status">未联机</p>
        </section>
        <section class="menuSection menuFooterActions">
          <button id="resetBtn" class="dangerButton">重启游戏</button>
          <button id="resumeBtn">继续游戏</button>
        </section>
        <button id="closeMenuBtn" class="ghostButton">关闭菜单</button>
      </dialog>

      <dialog id="libraryDialog" class="libraryDialog">
        <h2>中文游戏库</h2>
        <input id="librarySearchInput" class="librarySearch" type="search" placeholder="搜索游戏名称，例如：魂斗罗" autocomplete="off" />
        <p id="libraryStatusText" class="smallText">正在读取游戏目录...</p>
        <div id="libraryResults" class="libraryResults"></div>
        <button id="closeLibraryBtn">关闭</button>
      </dialog>

      <dialog id="settingsDialog">
        <h2>设置</h2>
        <label class="settingRange" for="controlOpacityInput">
          <span>手柄透明度</span>
          <output id="controlOpacityValue" for="controlOpacityInput">90%</output>
        </label>
        <input id="controlOpacityInput" class="rangeInput" type="range" min="45" max="100" step="5" value="90" />
        <button id="layoutEditBtn">调整按键位置</button>
        <div class="layoutPresetGroup" role="group" aria-label="全局按键大小">
          <span class="smallText">全局按键大小</span>
          <div class="layoutPresets">
            <button type="button" data-layout-scale="0.85">小</button>
            <button type="button" data-layout-scale="1">标准</button>
            <button type="button" data-layout-scale="1.15">大</button>
          </div>
        </div>
        <button id="resetLayoutBtn">重置按键位置</button>
        <button id="closeSettingsBtn">关闭</button>
        <p id="settingsModeText" class="smallText">横屏与竖屏布局会分别保存，不会互相影响。</p>
      </dialog>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
